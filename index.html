<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אינדוקציה כהלכה 888 | כניסה למערכת</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@300;400;500;600;700;800;900&family=Noto+Serif+Hebrew:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #503AA8;
  --purple-deep: #3B2884;
  --purple-light: #7B65D4;
  --purple-mist: #EDE8F8;
  --purple-ghost: #F6F3FC;
  --gold: #C9A84C;
  --gold-light: #E8D48B;
  --gold-pale: #FBF6E8;
  --cream: #FDFBF7;
  --cream-dark: #F5F0E8;
  --warm-white: #FEFDFB;
  --marble-1: #F8F5F0;
  --marble-2: #EDE8E0;
  --text-primary: #1A1432;
  --text-secondary: #4A4560;
  --text-muted: #8C87A0;
  --text-faint: #B5B0C5;
  --border: #E8E4F0;
  --border-light: #F0ECF5;
  --red: #D94040;
  --radius: 14px;
  --radius-lg: 24px;
  --shadow: 0 4px 20px rgba(80,58,168,0.08);
  --shadow-lg: 0 12px 40px rgba(80,58,168,0.10);
  --shadow-xl: 0 20px 60px rgba(80,58,168,0.12);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Heebo', sans-serif;
  background: var(--cream);
  color: var(--text-primary);
  line-height: 1.7;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.deco-grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.018;
  background-image:
    linear-gradient(var(--purple) 1px, transparent 1px),
    linear-gradient(90deg, var(--purple) 1px, transparent 1px);
  background-size: 80px 80px;
}

.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(80px);
  animation: orbFloat 20s ease-in-out infinite;
}
.orb-1 {
  width: 500px; height: 500px;
  background: rgba(80, 58, 168, 0.06);
  top: -100px; right: -100px;
}
.orb-2 {
  width: 400px; height: 400px;
  background: rgba(201, 168, 76, 0.05);
  bottom: 20%; left: -80px;
  animation-delay: -7s;
}
.orb-3 {
  width: 300px; height: 300px;
  background: rgba(80, 58, 168, 0.04);
  top: 50%; right: 10%;
  animation-delay: -14s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -40px) scale(1.05); }
  66% { transform: translate(-20px, 30px) scale(0.95); }
}

.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  padding: 20px;
  animation: fadeUp 0.8s var(--ease-smooth) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-card {
  background: white;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  box-shadow: var(--shadow-xl);
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0; left: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--purple), var(--gold), var(--purple));
}

.login-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}

.logo-mark {
  position: relative;
  width: 72px;
  height: 72px;
}

.logo-mark .ring {
  position: absolute;
  inset: 0;
  border: 2.5px solid var(--purple);
  border-radius: 18px;
  animation: ringRotate 8s ease-in-out infinite;
}

.logo-mark .ring-inner {
  position: absolute;
  inset: 7px;
  border: 2px solid var(--gold);
  border-radius: 14px;
  animation: ringRotate 8s ease-in-out infinite reverse;
}

@keyframes ringRotate {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(6deg); }
}

.logo-mark .num {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif Hebrew', serif;
  font-size: 24px;
  font-weight: 900;
  color: var(--purple);
}

.login-logo .brand {
  font-family: 'Noto Serif Hebrew', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
}

.login-logo .tagline {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold);
  font-weight: 600;
  text-transform: uppercase;
}

.login-title {
  font-family: 'Noto Serif Hebrew', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  margin-bottom: 8px;
}

.login-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 32px;
}

.field {
  position: relative;
  margin-bottom: 20px;
}

.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.field input {
  width: 100%;
  padding: 14px 18px;
  background: var(--marble-1);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  font-weight: 400;
  transition: all 0.3s var(--ease);
  outline: none;
}

.field input::placeholder {
  color: var(--text-faint);
  font-weight: 300;
}

.field input:hover {
  border-color: var(--purple-light);
  background: white;
}

.field input:focus {
  border-color: var(--purple);
  background: white;
  box-shadow: 0 0 0 4px rgba(80,58,168,0.08);
}

.field:focus-within label { color: var(--purple); }

.login-btn {
  width: 100%;
  padding: 16px;
  background: var(--purple);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: 'Heebo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.4s var(--ease);
  box-shadow: 0 8px 32px rgba(80,58,168,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 28px;
  position: relative;
  overflow: hidden;
}

.login-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
  transform: translateX(-120%);
  transition: transform 0.6s;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 44px rgba(80,58,168,0.3);
  background: var(--purple-deep);
}

.login-btn:hover::before { transform: translateX(120%); }

.login-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

.login-btn svg {
  width: 20px;
  height: 20px;
}

.error-msg {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  color: var(--red);
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  margin-top: 16px;
  display: none;
  animation: fadeUp 0.3s var(--ease-smooth);
}

.error-msg.visible {
  display: block;
}

.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-faint);
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 520px) {
  .login-card {
    padding: 36px 24px;
  }
  .logo-mark {
    width: 60px;
    height: 60px;
  }
  .logo-mark .num {
    font-size: 20px;
  }
  .login-logo .brand {
    font-size: 18px;
  }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div style="position:fixed;top:8px;left:8px;z-index:9999;background:#503AA8;color:white;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;opacity:0.85;font-family:'Heebo',sans-serif;">V0.7</div>

<div class="deco-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">
        <div class="ring"></div>
        <div class="ring-inner"></div>
        <div class="num">888</div>
      </div>
      <span class="brand">אינדוקציה כהלכה</span>
      <span class="tagline">EIIT 888 LTD</span>
    </div>

    <h1 class="login-title">כניסה למערכת</h1>
    <p class="login-subtitle">הזינו את פרטי ההתחברות שלכם</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">שם משתמש</label>
        <input type="text" id="username" placeholder="הזינו שם משתמש" required autocomplete="username">
      </div>
      <div class="field">
        <label for="password">סיסמה</label>
        <input type="password" id="password" placeholder="הזינו סיסמה" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        כניסה
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
      </button>
    </form>

    <div class="error-msg" id="errorMsg"></div>

    <div class="login-footer">
      &copy; 2026 אינדוקציה כהלכה 888 בע״מ
    </div>
  </div>
</div>

<script>
// If already logged in, redirect
const agent = localStorage.getItem('eiit_agent');
if (agent) {
  try {
    const parsed = JSON.parse(agent);
    if (parsed && parsed.username) {
      window.location.href = 'order.html';
    }
  } catch(e) {}
}

// Supabase configuration
const SUPABASE_URL = 'https://tmuijibbpwkfjmkgbddb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtdWlqaWJicHdrZmpta2diZGRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzY5NjksImV4cCI6MjA4ODExMjk2OX0.Efq5LJYUf3Cpj01GMR_Wr9ZHn4T2bMuhi55IPnE16wM';
let db;
try {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch(e) {
  console.error('Supabase init error:', e);
}

// Attach form handler via JS instead of inline onsubmit
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('errorMsg');

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) return;

  if (!db) {
    errorEl.textContent = 'שגיאת מערכת - Supabase לא נטען';
    errorEl.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<svg style="animation:spin 1s linear infinite" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> מתחבר...';
  errorEl.classList.remove('visible');

  try {
    const { data, error } = await db
      .from('agents')
      .select('*')
      .eq('username', username)
      .eq('password', password)
      .single();

    if (error || !data) {
      console.warn('[EIIT] כניסה נכשלה למשתמש:', username);
      throw new Error('auth_failed');
    }

    console.log('[EIIT] כניסה מוצלחת:', username);
    localStorage.setItem('eiit_agent', JSON.stringify({
      username: data.username,
      displayName: data.display_name || username,
      priorityAgentId: data.priority_agent_id || '',
      priorityAgentName: data.priority_agent_name || '',
      role: data.role || 'agent'
    }));

    window.location.href = 'order.html';
  } catch (err) {
    if (err.message === 'auth_failed') {
      errorEl.textContent = 'שם משתמש או סיסמה שגויים';
    } else {
      console.error('[EIIT] שגיאת התחברות:', err);
      errorEl.textContent = 'שגיאת מערכת - נסו שוב מאוחר יותר';
    }
    errorEl.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'כניסה <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>';
  }
});
</script>
</body>
</html>
